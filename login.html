<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUVA | Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600&family=Playfair+Display:wght=700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .brand-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FAFAFA] text-[#111111] pb-32">

    <header class="bg-white border-b border-gray-200 py-5 px-6 md:px-12 flex items-center justify-between sticky top-0 z-50">
        <div class="text-3xl font-bold tracking-widest brand-font">
            <a href="index.html">CUVA</a>
        </div>
        <nav class="hidden md:flex space-x-10 text-sm uppercase font-semibold">
            <a href="home.html" class="hover:text-[#D4AF37] transition-colors">Shop</a>
            <a href="about.html" class="hover:text-[#D4AF37] transition-colors">About</a>
            <a href="contact.html" class="hover:text-[#D4AF37] transition-colors">Contact</a>
        </nav>
    </header>

    <main class="max-w-6xl mx-auto px-6 md:px-12 pt-16">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16 divide-y md:divide-y-0 md:divide-x divide-gray-200">
            
            <div class="space-y-6 pt-8 md:pt-0">
                <h2 class="text-3xl font-bold brand-font">Login</h2>
                <p class="text-sm text-gray-500">Welcome back! Sign in to view your profile and orders.</p>
                
                <form id="loginForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Email Address</label>
                        <input type="email" id="loginEmail" required class="w-full border border-gray-300 p-3 text-sm focus:outline-none focus:border-[#D4AF37]">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Password</label>
                        <input type="password" id="loginPassword" required class="w-full border border-gray-300 p-3 text-sm focus:outline-none focus:border-[#D4AF37]">
                    </div>
                    <button type="submit" class="w-full bg-[#111111] text-white py-3 uppercase tracking-widest text-sm font-semibold hover:bg-[#D4AF37] transition duration-300">
                        Sign In
                    </button>
                </form>
            </div>

            <div class="space-y-6 pt-12 md:pt-0 md:pl-16">
                <h2 class="text-3xl font-bold brand-font">Create Account</h2>
                <p class="text-sm text-gray-500">New to CUVA? Register now to manage your details and speed up checkouts.</p>
                
                <form id="registerForm" class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Full Name</label>
                        <input type="text" id="regName" required class="w-full border border-gray-300 p-3 text-sm focus:outline-none focus:border-[#D4AF37]">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Email Address</label>
                        <input type="email" id="regEmail" required class="w-full border border-gray-300 p-3 text-sm focus:outline-none focus:border-[#D4AF37]">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Phone Number</label>
                        <input type="tel" id="regPhone" placeholder="01xxxxxxxxx" required class="w-full border border-gray-300 p-3 text-sm focus:outline-none focus:border-[#D4AF37]">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Password</label>
                        <input type="password" id="regPassword" required class="w-full border border-gray-300 p-3 text-sm focus:outline-none focus:border-[#D4AF37]">
                    </div>
                    <button type="submit" class="w-full bg-[#111111] text-white py-3 uppercase tracking-widest text-sm font-semibold hover:bg-[#D4AF37] transition duration-300">
                        Register
                    </button>
                </form>
            </div>

        </div>
    </main>

    <script>
        // الرابط الموحد للباك إند على البورت الجديد
        const BACKEND_URL = 'http://localhost:5000/api/auth';

        // أوتوماتيك: لو المستخدم أصلاً مسجل دخول ومعاه توكن، ابعته لصفحة الحساب علطول
        if (localStorage.getItem('cuva_token')) {
            window.location.href = 'account.html';
        }

        // 1. منطق إنشاء حساب جديد (Register)
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;

            try {
                await axios.post(`${BACKEND_URL}/register`, { name, email, phone, password });
                alert('Account created successfully under CUVA Brand! You can now log in.');
                document.getElementById('registerForm').reset();
            } catch (error) {
                console.error("Registration Error:", error);
                alert(error.response?.data?.message || 'Registration failed');
            }
        });

        // 2. منطق تسجيل الدخول (Login) النظيف والمؤمن ضد الريفريش والمسح
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault(); // منع مسح الداتا والريفريش فوراً

            localStorage.removeItem('cuva_token'); // تنظيف المتصفح أول بأول

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await axios.post(`${BACKEND_URL}/login`, { email, password });
                
                console.log("Login Successful!", response.data);

                if (response.data && response.data.token) {
                    localStorage.setItem('cuva_token', response.data.token);
                    alert('Login successful! Redirecting...');
                    window.location.replace("./account.html"); // تحويل إجباري مباشر
                } else {
                    alert('Logged in, but no token received.');
                }

            } catch (error) {
                console.error("🔥 FRONTEND LOGIN ERROR DETAILS:", error.response ? error.response.data : error.message);
                alert(error.response?.data?.message || 'Login failed. Check your password or email!');
            }
        });
    </script>
</body>
</html>
