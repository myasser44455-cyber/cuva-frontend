<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CUVA | My Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;600&family=Playfair+Display:wght=700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .brand-font { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#FAFAFA] text-[#111111] pb-32">

    <header class="bg-white border-b border-gray-200 py-5 px-6 md:px-12 flex items-center justify-between sticky top-0 z-50">
        <div class="text-3xl font-bold tracking-widest brand-font">
            <a href="index.html">CUVA</a>
        </div>
        <nav class="hidden md:flex space-x-10 text-sm uppercase font-semibold">
            <a href="home.html" class="hover:text-[#D4AF37] transition-colors">Shop</a>
        </nav>
    </header>

    <section class="max-w-7xl mx-auto px-6 md:px-12 pt-16">
        <h1 class="text-4xl font-bold brand-font text-center mb-12">My Account</h1>

        <div class="flex flex-col md:flex-row gap-12">
            <aside class="w-full md:w-1/4">
                <ul id="sidebarList" class="space-y-2">
    <li><a href="#" class="block p-3 bg-[#111111] text-white text-sm uppercase tracking-widest font-semibold">Profile Settings</a></li>
    <li><a href="#" class="block p-3 text-gray-600 hover:bg-gray-100 text-sm uppercase tracking-widest font-semibold transition">Order History</a></li>
    
    <li><a href="admin.html" class="block p-3 text-blue-600 hover:bg-blue-50 text-sm uppercase tracking-widest font-semibold transition underline">Admin Dashboard</a></li>
    
    <li><button id="logoutBtn" class="w-full text-left block p-3 text-red-600 hover:bg-red-50 text-sm uppercase tracking-widest font-semibold transition mt-6">Logout</button></li>
</ul>
            </aside>

            <div class="w-full md:w-3/4 bg-white p-8 border border-gray-200">
                <h2 class="text-2xl font-bold brand-font mb-6">Profile Settings</h2>
                <form id="profileForm">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-8">
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Full Name</label>
                            <input type="text" id="profileName" required class="w-full border border-gray-300 p-3 text-sm focus:outline-none focus:border-[#D4AF37]">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Phone Number</label>
                            <input type="tel" id="profilePhone" class="w-full border border-gray-300 p-3 text-sm focus:outline-none focus:border-[#D4AF37]">
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-widest mb-2">Email Address</label>
                            <input type="email" id="profileEmail" required class="w-full border border-gray-300 p-3 text-sm bg-gray-50 text-gray-500 cursor-not-allowed" readonly>
                        </div>
                    </div>
                    <button type="submit" id="saveBtn" class="bg-[#111111] text-white px-8 py-3 uppercase tracking-widest text-sm font-semibold hover:bg-[#D4AF37] transition">Save Changes</button>
                </form>
            </div>
        </div>
    </section>

    <script>
        const BACKEND_URL = 'http://localhost:5000/api/auth';

        async function initPage() {
            const token = localStorage.getItem('cuva_token'); 
            const userInfo = JSON.parse(localStorage.getItem('userInfo'));

            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            // 1. إضافة زر الأدمن إذا كان المستخدم أدمن
            if (userInfo && userInfo.isAdmin === true) {
                const sidebarList = document.getElementById('sidebarList');
                const logoutLi = document.getElementById('logoutBtn').parentElement;
                
                const adminLi = document.createElement('li');
                adminLi.innerHTML = `<a href="admin.html" class="block p-3 text-blue-600 hover:bg-blue-50 text-sm uppercase tracking-widest font-semibold transition">Admin Dashboard</a>`;
                
                // إضافة الزر قبل زر الـ Logout
                sidebarList.insertBefore(adminLi, logoutLi);
            }

            // 2. تحميل البيانات
            try {
                const response = await axios.get(`${BACKEND_URL}/me`, {
                    headers: { Authorization: `Bearer ${token}` }
                }); 
                const user = response.data;
                document.getElementById('profileName').value = user.name || '';
                document.getElementById('profileEmail').value = user.email || '';
                document.getElementById('profilePhone').value = user.phone || ''; 
            } catch (error) {
                console.error("Error loading profile:", error);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.textContent = 'Saving...';
            
            const token = localStorage.getItem('cuva_token');
            const updatedData = {
                name: document.getElementById('profileName').value,
                phone: document.getElementById('profilePhone').value
            };

            try {
                await axios.put(`${BACKEND_URL}/profile`, updatedData, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                alert('Profile updated successfully! ✨');
            } catch (error) {
                alert('Failed to update.');
            } finally {
                saveBtn.textContent = 'Save Changes';
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = 'login.html'; 
        });

        window.onload = initPage;
    </script>
</body>
</html>
